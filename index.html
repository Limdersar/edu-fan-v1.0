```html
<!DOCTYPE html>

<body>
    <div id="app"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, doc, onSnapshot, runTransaction, query, getDocs, deleteDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // --- 1. 환경 설정 ---
        const firebaseConfig = {
            apiKey: "AIzaSyCHZ4mmnkEkbfdB-n-MuxAYgZY793opNIQ",
            authDomain: "fan-edu-v1.firebaseapp.com",
            projectId: "fan-edu-v1",
            storageBucket: "fan-edu-v1.firebasestorage.app",
            messagingSenderId: "363111742847",
            appId: "1:363111742847:web:1c00d8ef30c229cc196e4a",
            measurementId: "G-8BLR7P7N97"
        };

        const appId = 'edu-reg-2026-v2'; 
        const MAX_CAPACITY = 11;
        const ADMIN_PASSWORD = "admin1234";
        
        // 요청하신 2026년 특정 날짜 리스트
        const TARGET_DATES = [
            "2026-04-23", "2026-04-24", "2026-04-27", "2026-04-28", "2026-04-29",
            "2026-05-06", "2026-05-07", "2026-05-08"
        ];
        
        const TERMS = "개인정보 수집 및 이용에 동의합니다. (수집항목: 대리점명, 이름, 연락처 / 보유기간: 교육 종료 후 1년)";

        const getDayOfWeek = (dateString) => {
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            return days[new Date(dateString).getDay()];
        };

        const formatDisplayDate = (dateString) => {
            const [y, m, d] = dateString.split('-');
            return `${parseInt(m)}/${parseInt(d)} (${getDayOfWeek(dateString)})`;
        };

        // --- 2. 상태 관리 ---
        let state = {
            view: 'registration',
            user: null,
            registrations: [],
            selectedSession: null,
            isAdminAuthenticated: false,
            isSubmitting: false,
            settings: {
                startAt: "",
                endAt: ""
            }
        };

        let db, auth;

        function setState(newState) {
            state = { ...state, ...newState };
            render();
        }

        // --- 3. 핵심 함수 ---
        async function initFirebase() {
            try {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (user) => {
                    state.user = user;
                    if (user) {
                        listenToData();
                        listenToSettings();
                    }
                });
            } catch (err) {
                console.error("Firebase Init Error:", err);
                render();
            }
        }

        function listenToData() {
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'registrations');
            onSnapshot(q, (snap) => {
                state.registrations = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render(); 
            });
        }

        function listenToSettings() {
            const docRef = doc(db, 'artifacts', appId, 'settings', 'config');
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    state.settings = docSnap.data();
                }
                render();
            });
        }

        window.selectSession = (date, time) => {
            state.selectedSession = { date, time };
            render(); 
        };

        async function handleRegister(e) {
            e.preventDefault();
            
            const now = new Date();
            if (state.settings.startAt && new Date(state.settings.startAt) > now) return alert("아직 접수 기간이 아닙니다.");
            if (state.settings.endAt && new Date(state.settings.endAt) < now) return alert("접수 기간이 종료되었습니다.");

            if (!state.selectedSession) return alert("교육 회차를 선택해주세요.");
            
            const agency = document.getElementById('input-agency').value;
            const name = document.getElementById('input-name').value;
            const phone = document.getElementById('input-phone').value;
            const agreed = document.getElementById('input-agree').checked;

            if (!agreed) return alert("개인정보 동의가 필요합니다.");

            setState({ isSubmitting: true });

            try {
                await runTransaction(db, async (transaction) => {
                    const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'registrations'));
                    const snap = await getDocs(q);
                    const count = snap.docs.filter(d => 
                        d.data().date === state.selectedSession.date && 
                        d.data().time === state.selectedSession.time
                    ).length;

                    if (count >= MAX_CAPACITY) throw new Error("이미 해당 회차의 정원이 마감되었습니다.");

                    const newDocRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'registrations'));
                    transaction.set(newDocRef, {
                        agency, name, phone,
                        date: state.selectedSession.date,
                        time: state.selectedSession.time,
                        createdAt: new Date().toISOString(),
                        userId: state.user.uid
                    });
                });
                setState({ view: 'success', isSubmitting: false });
            } catch (err) {
                alert(err.message);
                setState({ isSubmitting: false });
            }
        }

        window.deleteRegistration = async (id) => {
            if (!confirm("해당 신청 내역을 삭제하시겠습니까?")) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'registrations', id));
            } catch (err) {
                alert("삭제 실패: " + err.message);
            }
        };

        window.updateSettings = async () => {
            const startAt = document.getElementById('settings-start').value;
            const endAt = document.getElementById('settings-end').value;
            try {
                const docRef = doc(db, 'artifacts', appId, 'settings', 'config');
                await setDoc(docRef, { startAt, endAt });
                alert("설정이 저장되었습니다.");
            } catch (err) {
                alert("저장 실패: " + err.message);
            }
        };

        function downloadCSV() {
            const headers = ["신청날짜", "회차", "대리점", "이름", "연락처", "접수시각"];
            const rows = state.registrations.sort((a,b) => a.date.localeCompare(b.date)).map(r => [
                r.date, r.time, r.agency, r.name, r.phone, r.createdAt
            ]);
            const content = "\uFEFF" + [headers, ...rows].map(e => e.join(",")).join("\n");
            const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `교육신청명단_2026.csv`;
            link.click();
        }

        // --- 4. 렌더링 엔진 ---
        function render() {
            const appDiv = document.getElementById('app');
            if (!appDiv) return;

            const currentAgency = document.getElementById('input-agency')?.value || "";
            const currentName = document.getElementById('input-name')?.value || "";
            const currentPhone = document.getElementById('input-phone')?.value || "";
            const currentAgree = document.getElementById('input-agree')?.checked || false;

            if (state.view === 'registration') {
                const now = new Date();
                const isStarted = !state.settings.startAt || new Date(state.settings.startAt) <= now;
                const isEnded = state.settings.endAt && new Date(state.settings.endAt) < now;
                const canRegister = isStarted && !isEnded;

                appDiv.innerHTML = `
                    <nav class="bg-white border-b sticky top-0 z-20">
                        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
                            <h1 class="font-bold text-blue-700 text-lg flex items-center gap-2">
                                <i class="fa-solid fa-calendar-check"></i> 2026 교육 신청
                            </h1>
                            <button onclick="window.toAdmin()" class="p-2 text-slate-400 hover:text-blue-600 transition-colors">
                                <i class="fa-solid fa-gear"></i>
                            </button>
                        </div>
                    </nav>

                    <main class="max-w-5xl mx-auto px-4 py-8">
                        ${!canRegister ? `
                            <div class="bg-amber-50 border border-amber-200 p-6 rounded-2xl mb-8 text-center text-amber-800 shadow-sm animate-pulse">
                                <p class="font-bold">${isEnded ? '접수 기간이 종료되었습니다.' : '아직 접수 기간이 아닙니다.'}</p>
                                <p class="text-sm mt-1 opacity-80">접수 기간: ${state.settings.startAt?.replace('T',' ') || '미정'} ~ ${state.settings.endAt?.replace('T',' ') || '미정'}</p>
                            </div>
                        ` : ''}

                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 ${!canRegister ? 'opacity-50 pointer-events-none' : ''}">
                            <section class="space-y-6">
                                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                    <h2 class="text-lg font-bold mb-6 flex items-center gap-2"><i class="fa-solid fa-id-card text-blue-500"></i> 신청자 정보</h2>
                                    <form id="main-form" class="space-y-4">
                                        <div>
                                            <label class="text-sm font-semibold text-slate-600 block mb-1">대리점명</label>
                                            <input id="input-agency" type="text" required placeholder="대리점명을 입력하세요" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all" value="${currentAgency}">
                                        </div>
                                        <div>
                                            <label class="text-sm font-semibold text-slate-600 block mb-1">신청자 성함</label>
                                            <input id="input-name" type="text" required placeholder="성함을 입력하세요" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all" value="${currentName}">
                                        </div>
                                        <div>
                                            <label class="text-sm font-semibold text-slate-600 block mb-1">연락처</label>
                                            <input id="input-phone" type="tel" required placeholder="010-0000-0000" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all" value="${currentPhone}">
                                        </div>
                                        <div class="pt-4 border-t">
                                            <label class="flex items-start gap-3 cursor-pointer group">
                                                <input id="input-agree" type="checkbox" required class="mt-1 w-4 h-4 rounded text-blue-600 border-slate-300 focus:ring-blue-500" ${currentAgree ? 'checked' : ''}>
                                                <span class="text-xs text-slate-500 leading-relaxed group-hover:text-slate-700 transition-colors">${TERMS}</span>
                                            </label>
                                        </div>
                                        <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg shadow-blue-100 hover:bg-blue-700 hover:shadow-blue-200 active:scale-[0.98] transition-all">신청하기</button>
                                    </form>
                                </div>
                            </section>

                            <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col h-full">
                                <h2 class="text-lg font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-clock text-blue-500"></i> 교육 일정 선택</h2>
                                <div class="grid grid-cols-1 gap-4 overflow-y-auto pr-2 custom-scrollbar flex-1" style="max-height: 520px;">
                                    ${TARGET_DATES.map(dateStr => {
                                        const displayDate = formatDisplayDate(dateStr);
                                        const amRegs = state.registrations.filter(r => r.date === dateStr && r.time === '오전').length;
                                        const pmRegs = state.registrations.filter(r => r.date === dateStr && r.time === '오후').length;
                                        
                                        const isAmSelected = state.selectedSession?.date === dateStr && state.selectedSession?.time === '오전';
                                        const isPmSelected = state.selectedSession?.date === dateStr && state.selectedSession?.time === '오후';

                                        const amRemaining = MAX_CAPACITY - amRegs;
                                        const pmRemaining = MAX_CAPACITY - pmRegs;

                                        return `
                                            <div class="p-4 border border-slate-100 bg-slate-50 rounded-2xl">
                                                <div class="text-sm font-bold text-slate-800 mb-3 ml-1 flex items-center gap-2">
                                                    <i class="fa-solid fa-calendar-day text-blue-400"></i> ${displayDate}
                                                </div>
                                                <div class="grid grid-cols-2 gap-3">
                                                    <!-- 오전 버튼 -->
                                                    <button onclick="window.selectSession('${dateStr}', '오전')" 
                                                        ${amRemaining <= 0 ? 'disabled' : ''}
                                                        class="session-btn p-3 rounded-xl border-2 text-left relative ${
                                                            isAmSelected ? 'selected' :
                                                            amRemaining > 0 ? 'bg-white border-slate-100' : 
                                                            'bg-slate-200 border-transparent opacity-60 cursor-not-allowed'
                                                        }">
                                                        <div class="font-bold text-sm ${amRemaining > 0 ? 'text-slate-700' : 'text-slate-400'}">오전 9시</div>
                                                        <div class="mt-1 flex flex-col">
                                                            <span class="text-[10px] text-slate-400 font-medium">${amRegs}/${MAX_CAPACITY}</span>
                                                            <span class="text-[11px] font-bold ${amRemaining > 0 ? 'text-blue-600' : 'text-slate-400'}">
                                                                ${amRemaining <= 0 ? '마감' : amRemaining + '석 남음'}
                                                            </span>
                                                        </div>
                                                    </button>
                                                    <!-- 오후 버튼 -->
                                                    <button onclick="window.selectSession('${dateStr}', '오후')" 
                                                        ${pmRemaining <= 0 ? 'disabled' : ''}
                                                        class="session-btn p-3 rounded-xl border-2 text-left relative ${
                                                            isPmSelected ? 'selected' :
                                                            pmRemaining > 0 ? 'bg-white border-slate-100' : 
                                                            'bg-slate-200 border-transparent opacity-60 cursor-not-allowed'
                                                        }">
                                                        <div class="font-bold text-sm ${pmRemaining > 0 ? 'text-slate-700' : 'text-slate-400'}">오후 2시</div>
                                                        <div class="mt-1 flex flex-col">
                                                            <span class="text-[10px] text-slate-400 font-medium">${pmRegs}/${MAX_CAPACITY}</span>
                                                            <span class="text-[11px] font-bold ${pmRemaining > 0 ? 'text-blue-600' : 'text-slate-400'}">
                                                                ${pmRemaining <= 0 ? '마감' : pmRemaining + '석 남음'}
                                                            </span>
                                                        </div>
                                                    </button>
                                                </div>
                                            </div>
                                        `;
                                    }).join('')}
                                </div>
                            </section>
                        </div>
                    </main>
                    ${state.isSubmitting ? '<div class="fixed inset-0 loading-overlay flex items-center justify-center z-50"><div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div></div>' : ''}
                `;
                document.getElementById('main-form')?.addEventListener('submit', handleRegister);
            } 
            
            else if (state.view === 'admin') {
                if (!state.isAdminAuthenticated) {
                    appDiv.innerHTML = `
                        <div class="min-h-screen flex items-center justify-center p-4">
                            <div class="bg-white p-8 rounded-2xl shadow-sm border w-full max-w-md">
                                <h2 class="text-xl font-bold mb-6">관리자 로그인</h2>
                                <input id="admin-pw" type="password" class="w-full p-4 border rounded-xl mb-4 outline-none focus:ring-2 focus:ring-blue-500" placeholder="비밀번호">
                                <button onclick="window.loginAdmin()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold hover:bg-black transition-colors">로그인</button>
                                <button onclick="window.setView('registration')" class="w-full mt-4 text-slate-400 text-sm hover:underline text-center block">돌아가기</button>
                            </div>
                        </div>
                    `;
                } else {
                    appDiv.innerHTML = `
                        <nav class="bg-white border-b sticky top-0 z-20">
                            <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                                <h1 class="font-bold text-slate-800 flex items-center gap-2"><i class="fa-solid fa-user-shield text-blue-600"></i> 관리자 패널</h1>
                                <div class="flex gap-2">
                                    <button onclick="window.downloadCSV()" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-green-700 transition-colors"><i class="fa-solid fa-download mr-2"></i>엑셀</button>
                                    <button onclick="window.setView('registration')" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-lg text-sm font-bold hover:bg-slate-200">나가기</button>
                                </div>
                            </div>
                        </nav>
                        <main class="max-w-6xl mx-auto px-4 py-8 space-y-8">
                            <section class="bg-white p-6 rounded-2xl shadow-sm border">
                                <h2 class="text-lg font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-clock text-blue-500"></i> 접수 기간 설정</h2>
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
                                    <div>
                                        <label class="text-xs text-slate-500 mb-1 block">시작 일시</label>
                                        <input id="settings-start" type="datetime-local" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" value="${state.settings.startAt || ''}">
                                    </div>
                                    <div>
                                        <label class="text-xs text-slate-500 mb-1 block">종료 일시</label>
                                        <input id="settings-end" type="datetime-local" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" value="${state.settings.endAt || ''}">
                                    </div>
                                    <button onclick="window.updateSettings()" class="bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition-colors">설정 저장</button>
                                </div>
                            </section>

                            <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                                <div class="p-4 bg-slate-50 border-b flex justify-between items-center">
                                    <h3 class="font-bold">신청 명단 (${state.registrations.length}명)</h3>
                                </div>
                                <div class="overflow-x-auto">
                                    <table class="w-full text-sm text-left">
                                        <thead class="bg-slate-50 text-slate-500 font-semibold uppercase">
                                            <tr>
                                                <th class="px-6 py-4">교육일시</th>
                                                <th class="px-6 py-4">대리점</th>
                                                <th class="px-6 py-4">신청자</th>
                                                <th class="px-6 py-4">연락처</th>
                                                <th class="px-6 py-4">관리</th>
                                            </tr>
                                        </thead>
                                        <tbody class="divide-y">
                                            ${state.registrations.sort((a,b) => b.createdAt.localeCompare(a.createdAt)).map(r => `
                                                <tr class="hover:bg-slate-50 transition">
                                                    <td class="px-6 py-4 font-bold text-blue-600">${formatDisplayDate(r.date)} ${r.time}</td>
                                                    <td class="px-6 py-4">${r.agency}</td>
                                                    <td class="px-6 py-4 font-semibold text-slate-800">${r.name}</td>
                                                    <td class="px-6 py-4 text-slate-600">${r.phone}</td>
                                                    <td class="px-6 py-4">
                                                        <button onclick="window.deleteRegistration('${r.id}')" class="text-red-400 hover:text-red-600 p-2 rounded transition-colors">
                                                            <i class="fa-solid fa-trash-can"></i>
                                                        </button>
                                                    </td>
                                                </tr>
                                            `).join('')}
                                        </tbody>
                                    </table>
                                    ${state.registrations.length === 0 ? '<div class="p-12 text-center text-slate-400">신청 내역이 없습니다.</div>' : ''}
                                </div>
                            </div>
                        </main>
                    `;
                }
            }

            else if (state.view === 'success') {
                appDiv.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center p-4">
                        <div class="bg-white p-12 rounded-3xl shadow-xl border text-center max-w-sm w-full space-y-6 animate-in zoom-in duration-300">
                            <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto text-3xl shadow-sm">
                                <i class="fa-solid fa-check"></i>
                            </div>
                            <div class="space-y-2">
                                <h2 class="text-2xl font-bold">신청 완료</h2>
                                <p class="text-slate-500">교육 접수가 정상적으로 완료되었습니다.</p>
                            </div>
                            <button onclick="location.reload()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition-colors">홈으로 돌아가기</button>
                        </div>
                    </div>
                `;
            }
        }

        window.setView = (view) => setState({ view });
        window.toAdmin = () => setState({ view: 'admin' });
        window.loginAdmin = () => {
            const val = document.getElementById('admin-pw').value;
            if (val === ADMIN_PASSWORD) setState({ isAdminAuthenticated: true });
            else alert("비밀번호가 틀렸습니다.");
        };
        window.downloadCSV = downloadCSV;

        initFirebase();
        render();

    </script>
